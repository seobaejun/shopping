<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MD 관리자 로그인 - 10쇼핑게임</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }

        .login-container {
            background: white;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .login-header {
            margin-bottom: 2rem;
        }

        .login-header h1 {
            color: #667eea;
            font-size: 2rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .login-header p {
            color: #666;
            font-size: 1rem;
        }

        .form-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            color: #333;
        }

        .form-group input {
            width: 100%;
            padding: 1rem;
            border: 2px solid #e1e5e9;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .form-group input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn-login {
            width: 100%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            padding: 1rem;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-bottom: 1rem;
        }

        .btn-login:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-login:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .login-footer {
            margin-top: 2rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
        }

        .login-footer a {
            color: #667eea;
            text-decoration: none;
            font-size: 0.9rem;
        }

        .login-footer a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #f8d7da;
            color: #721c24;
            padding: 0.8rem;
            border-radius: 8px;
            margin-bottom: 1rem;
            font-size: 0.9rem;
            display: none;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 0.5rem;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .info-box {
            background: #d1ecf1;
            color: #0c5460;
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1.5rem;
            font-size: 0.9rem;
            text-align: left;
        }

        .info-box h4 {
            margin-bottom: 0.5rem;
            color: #0c5460;
        }

        .info-box ul {
            margin-left: 1rem;
        }

        .info-box li {
            margin-bottom: 0.3rem;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-header">
            <h1><i class="fas fa-user-tie"></i> 10-shopping MD 관리자</h1>
            <p>이메일과 비밀번호로 로그인하세요</p>
        </div>

        <div class="error-message" id="errorMessage"></div>

        <form id="loginForm">
            <div class="form-group">
                <label for="userId">이메일</label>
                <input type="text" id="userId" name="userId" placeholder="회원가입 시 사용한 이메일" required>
            </div>

            <div class="form-group">
                <label for="password">비밀번호</label>
                <input type="password" id="password" name="password" placeholder="MD 관리자 비밀번호를 입력하세요" required>
            </div>

            <button type="submit" class="btn-login" id="loginBtn">
                <i class="fas fa-sign-in-alt"></i> 로그인
            </button>
        </form>

        <div class="login-footer">
            <a href="../index.html"><i class="fas fa-home"></i> 메인 페이지로 돌아가기</a>
        </div>
    </div>

    <!-- Firebase 설정 -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <script src="../js/firebase-config.js"></script>
    <script>
        // Firebase 초기화 확인
        document.addEventListener('DOMContentLoaded', function() {
            console.log('페이지 로드됨');
            console.log('Firebase:', typeof firebase);
            console.log('window.db:', window.db);
            
            // Firebase 수동 초기화 시도
            if (typeof firebase !== 'undefined' && !window.db) {
                try {
                    if (!firebase.apps.length) {
                        // Firebase 설정 (firebase-config.js에서 가져와야 함)
                        const firebaseConfig = {
                            apiKey: "AIzaSyDGpAHia_wEmrhnmYjrPf1n1TrAzwEMiAI",
                            authDomain: "shopping-2e9d5.firebaseapp.com",
                            projectId: "shopping-2e9d5",
                            storageBucket: "shopping-2e9d5.firebasestorage.app",
                            messagingSenderId: "381044411321",
                            appId: "1:381044411321:web:7c197439b0c7098bb83085"
                        };
                        firebase.initializeApp(firebaseConfig);
                    }
                    window.db = firebase.firestore();
                    console.log('Firebase 수동 초기화 완료');
                } catch (error) {
                    console.error('Firebase 수동 초기화 오류:', error);
                }
            }
        });
    </script>
    <script>
        // MD 로그인: 쇼핑몰 가입 시 사용한 이메일+비밀번호(Firebase Auth)로 로그인 후, MD 등록 여부만 확인
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const email = document.getElementById('userId').value.trim();
            const password = document.getElementById('password').value.trim();
            const loginBtn = document.getElementById('loginBtn');
            
            console.log('MD 로그인 시도 (이메일):', email);
            
            if (!email || !password) {
                showError('이메일과 비밀번호를 모두 입력해주세요.');
                return;
            }
            
            loginBtn.disabled = true;
            loginBtn.innerHTML = '<div class="loading"></div> 로그인 중...';
            hideError();
            
            try {
                if (typeof firebase === 'undefined' || !firebase.auth) {
                    showError('Firebase Auth를 사용할 수 없습니다. 페이지를 새로고침해주세요.');
                    return;
                }
                
                // 1) 쇼핑몰 가입 계정(Firebase Auth)으로 로그인
                const userCred = await firebase.auth().signInWithEmailAndPassword(email, password);
                const authUser = userCred.user;
                const loginEmail = (authUser.email || email).trim();
                
                let retryCount = 0;
                const maxRetries = 50;
                while (!window.db && retryCount < maxRetries) {
                    await new Promise(resolve => setTimeout(resolve, 100));
                    retryCount++;
                }
                
                if (!window.db) {
                    showError('Firebase 연결에 실패했습니다. 페이지를 새로고침해주세요.');
                    return;
                }
                
                // 2) 해당 계정이 MD로 등록되어 있는지 확인
                let mdSnap = await window.db.collection('mdManagers').where('email', '==', loginEmail).get();
                if (mdSnap.empty) {
                    mdSnap = await window.db.collection('mdManagers').where('userId', '==', loginEmail).get();
                }
                if (mdSnap.empty) {
                    firebase.auth().signOut();
                    showError('등록된 MD가 아니거나 이메일이 일치하지 않습니다. 관리자에게 문의하세요.');
                    return;
                }
                
                const mdData = mdSnap.docs[0].data();
                if ((mdData.status || 'active') !== 'active') {
                    firebase.auth().signOut();
                    showError('비활성화된 MD 계정입니다. 관리자에게 문의하세요.');
                    return;
                }
                
                // members에서 이메일 또는 userId로 회원 조회
                let memberSnap = await window.db.collection('members').where('email', '==', loginEmail).limit(1).get();
                if (memberSnap.empty && (mdData.userId || mdData.email)) {
                    memberSnap = await window.db.collection('members').where('userId', '==', mdData.userId || loginEmail).limit(1).get();
                }
                
                const memberDoc = memberSnap.empty ? null : memberSnap.docs[0];
                const memberData = memberDoc ? memberDoc.data() : mdData;
                const memberId = memberDoc ? memberDoc.id : mdSnap.docs[0].id;
                
                const loginData = {
                    id: memberId,
                    userId: memberData.userId || mdData.userId || loginEmail,
                    userName: memberData.name || memberData.userName || mdData.name || 'MD관리자',
                    mdCode: memberData.mdCode || mdData.mdCode || '',
                    email: memberData.email || mdData.email || loginEmail,
                    phone: memberData.mobile || memberData.phone || mdData.phone || '',
                    loginTime: new Date().toISOString()
                };
                
                localStorage.setItem('isMdAdmin', 'true');
                localStorage.setItem('mdAdminData', JSON.stringify(loginData));
                if (loginData.mdCode) localStorage.setItem('currentMdCode', loginData.mdCode);
                
                window.location.href = 'index.html';
                
            } catch (error) {
                console.error('로그인 오류:', error);
                var msg = '로그인 중 오류가 발생했습니다.';
                if (error.code === 'auth/user-not-found' || error.code === 'auth/invalid-credential') {
                    msg = '등록되지 않은 이메일이거나 비밀번호가 일치하지 않습니다.';
                } else if (error.code === 'auth/wrong-password') {
                    msg = '비밀번호가 일치하지 않습니다.';
                } else if (error.code === 'auth/invalid-email') {
                    msg = '올바른 이메일 형식을 입력해주세요.';
                } else if (error.code && error.message) {
                    msg = error.message;
                }
                showError(msg);
            } finally {
                loginBtn.disabled = false;
                loginBtn.innerHTML = '<i class="fas fa-sign-in-alt"></i> 로그인';
            }
        });
        
        function showError(message) {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.textContent = message;
            errorMessage.style.display = 'block';
        }
        
        function hideError() {
            const errorMessage = document.getElementById('errorMessage');
            errorMessage.style.display = 'none';
        }
        
        // 엔터키 처리
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
        
        // 이메일 입력 필드 (숫자 제한 제거)
    </script>
</body>
</html>
