        function generateTempPassword(userId, phone) {
            const phoneDigits = (phone || '').replace(/\\D/g, '');
            const last4 = phoneDigits.slice(-4) || '0000';
            return \`\${userId}\${last4}\`;
        }

        async function checkExistingUser(userId) {
            try {
                const userQuery = await db.collection('members').where('userId', '==', userId).limit(1).get();
                return !userQuery.empty;
            } catch (error) {
                log(\`기존 회원 확인 오류 (\${userId}): \${error.message}\`, 'error');
                return true;
            }
        }

        async function migrateUser(userData) {
            const { userId, name, joinDate, email, phone } = userData;

            try {
                const exists = await checkExistingUser(userId);
                if (exists) {
                    log(\`⏭️  기존 회원 스킵: \${userId}\`, 'skip');
                    stats.skip++;
                    return { success: true, skipped: true };
                }

                const tempPassword = generateTempPassword(userId, phone);

                const memberData = {
                    userId: userId,
                    email: email || '',
                    name: name || '',
                    userName: name || '',
                    phone: phone || '',
                    tempPassword: tempPassword,
                    status: '정상',
                    joinDate: joinDate ? new Date(joinDate) : new Date(),
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
                    purchaseAmount: 0,
                    supportAmount: 0,
                    referralCode: '',
                    recommender: '관리자',
                    mdCode: '',
                    address: '',
                    detailAddress: '',
                    postcode: '',
                    accountNumber: ''
                };

                const docRef = db.collection('members').doc();
                await docRef.set(memberData);

                log(\`✅ 회원 생성: \${userId} (\${name})\`, 'success');
                stats.success++;
                return { success: true };

            } catch (error) {
                log(\`❌ 생성 실패: \${userId} - \${error.message}\`, 'error');
                stats.error++;
                return { success: false };
            }
        }

        async function checkStatus() {
            try {
                const membersSnapshot = await db.collection('members').get();
                const memberCount = membersSnapshot.size;
                
                document.getElementById('status').innerHTML = \`
                    현재 Firestore members: <strong>\${memberCount}명</strong> | 
                    성공: <span class="success">\${stats.success}</span> | 
                    스킵: <span class="skip">\${stats.skip}</span> | 
                    실패: <span class="error">\${stats.error}</span>
                \`;
                
                log(\`📊 현재 상태 - Firestore: \${memberCount}명\`);
            } catch (error) {
                log(\`상태 확인 오류: \${error.message}\`, 'error');
            }
        }

        async function migrateBatch() {
            const startBtn = document.getElementById('startBtn');
            startBtn.disabled = true;
            startBtn.textContent = '처리 중...';

            try {
                const batchData = allBatches[currentBatch - 1];
                
                if (!batchData) {
                    log('🎉 모든 배치 완료!', 'success');
                    startBtn.textContent = '모든 배치 완료';
                    return;
                }

                log(\`🚀 배치 \${currentBatch} 시작 (10명)\`);

                for (let i = 0; i < batchData.length; i++) {
                    const userData = batchData[i];
                    
                    log(\`🔄 \${i + 1}/10: \${userData.userId} (\${userData.name})\`);
                    
                    await migrateUser(userData);
                    
                    // API 제한 방지
                    await new Promise(resolve => setTimeout(resolve, 1000));
                }

                log(\`✅ 배치 \${currentBatch} 완료!\`, 'success');
                
                currentBatch++;
                document.getElementById('batchNum').textContent = currentBatch;
                
                await checkStatus();

            } catch (error) {
                log(\`💥 배치 실패: \${error.message}\`, 'error');
            } finally {
                startBtn.disabled = false;
                if (currentBatch <= allBatches.length) {
                    startBtn.textContent = '다음 10명 마이그레이션';
                } else {
                    startBtn.textContent = '모든 배치 완료';
                }
            }
        }

        window.addEventListener('load', () => {
