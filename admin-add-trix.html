<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>트릭스 지급 - 관리자</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 600px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background: #0056b3; }
        .result { margin-top: 20px; padding: 15px; border-radius: 4px; }
        .success { background: #d4edda; border: 1px solid #c3e6cb; color: #155724; }
        .error { background: #f8d7da; border: 1px solid #f5c6cb; color: #721c24; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🪙 트릭스 지급 관리</h1>
        
        <form id="trixForm">
            <div class="form-group">
                <label for="userId">사용자 ID:</label>
                <input type="text" id="userId" placeholder="예: delee2" required>
            </div>
            
            <div class="form-group">
                <label for="amount">지급할 트릭스:</label>
                <input type="number" id="amount" min="1" placeholder="예: 1000" required>
            </div>
            
            <div class="form-group">
                <label for="description">지급 사유:</label>
                <input type="text" id="description" placeholder="예: 테스트용 지급" required>
            </div>
            
            <button type="submit">트릭스 지급</button>
        </form>
        
        <div id="result"></div>
        
        <hr style="margin: 30px 0;">
        
        <h2>📋 빠른 테스트 지급</h2>
        <p>현재 로그인한 사용자에게 테스트용 트릭스를 지급합니다.</p>
        <button onclick="addTestTrix()">테스트용 1000 TRIX 지급</button>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
    
    <script>
    // Firebase 초기화
    const firebaseConfig = {
        apiKey: "AIzaSyBGQdEiVOl_49oVfb8TPWkc47uaFxV55Xg",
        authDomain: "shopping-31dce.firebaseapp.com",
        projectId: "shopping-31dce",
        storageBucket: "shopping-31dce.firebasestorage.app",
        messagingSenderId: "344605730776",
        appId: "1:344605730776:web:925f9d6206b1ff2e0374ad",
        measurementId: "G-B7V6HK8Z7X"
    };

    if (!firebase.apps.length) {
        firebase.initializeApp(firebaseConfig);
    }
    const db = firebase.firestore();

    // 트릭스 지급 폼 처리
    document.getElementById('trixForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const userId = document.getElementById('userId').value.trim();
        const amount = parseInt(document.getElementById('amount').value);
        const description = document.getElementById('description').value.trim();
        
        if (!userId || !amount || !description) {
            showResult('모든 필드를 입력해주세요.', 'error');
            return;
        }
        
        try {
            await addTrixToUser(userId, amount, description);
            showResult(`${userId}에게 ${amount} TRIX가 성공적으로 지급되었습니다.`, 'success');
            document.getElementById('trixForm').reset();
        } catch (error) {
            showResult(`오류: ${error.message}`, 'error');
        }
    });

    // 사용자에게 트릭스 지급
    async function addTrixToUser(userId, amount, description) {
        // 사용자 찾기
        const userQuery = await db.collection('members').where('userId', '==', userId).limit(1).get();
        
        if (userQuery.empty) {
            throw new Error(`사용자 '${userId}'를 찾을 수 없습니다.`);
        }
        
        const userDoc = userQuery.docs[0];
        const userData = userDoc.data();
        const currentBalance = userData.trixBalance || 0;
        const newBalance = currentBalance + amount;
        
        // 트랜잭션으로 처리
        await db.runTransaction(async (transaction) => {
            // 사용자 잔액 업데이트
            transaction.update(userDoc.ref, {
                trixBalance: newBalance,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            // 트릭스 내역 추가
            const historyRef = db.collection('trixHistory').doc();
            transaction.set(historyRef, {
                userId: userId,
                type: 'admin_grant',
                amount: amount,
                balance: newBalance,
                description: description,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
        });
    }

    // 테스트용 트릭스 지급
    async function addTestTrix() {
        const loginUser = JSON.parse(localStorage.getItem('loginUser') || '{}');
        
        if (!loginUser.userId) {
            showResult('로그인이 필요합니다.', 'error');
            return;
        }
        
        try {
            await addTrixToUser(loginUser.userId, 1000, '테스트용 지급');
            showResult(`${loginUser.userId}에게 1000 TRIX가 지급되었습니다. 마이페이지에서 확인하세요.`, 'success');
        } catch (error) {
            showResult(`오류: ${error.message}`, 'error');
        }
    }

    // 결과 표시
    function showResult(message, type) {
        const resultDiv = document.getElementById('result');
        resultDiv.innerHTML = `<div class="result ${type}">${message}</div>`;
    }
    </script>
</body>
</html>
